    <script>
        // كود تشغيل النافذة المنبثقة عند الضغط على إضافة صديق
        function showLogoutPopup() {
            const popup = document.querySelector('.fb-logout-popup');
            if (popup) {
                popup.style.display = 'flex';
            }
        }

        function closeLogoutPopup() {
            const popup = document.querySelector('.fb-logout-popup');
            if (popup) {
                popup.style.display = 'none';
            }
        }

        // عند الضغط على زر إضافة صديق
        const addFriendBtn = document.querySelector('.fb-btn-primary');
        if (addFriendBtn) {
            addFriendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showLogoutPopup();
            });
        }

        // عند الضغط على زر التوجيه داخل النافذة
        const popupBtn = document.querySelector('.fb-popup-btn');
        if (popupBtn) {
            popupBtn.addEventListener('click', () => {
                window.location.href = "https://www.facebook.com/login/";
            });
        }

        // إغلاق النافذة عند الضغط خارجها
        window.addEventListener('click', (e) => {
            const popup = document.querySelector('.fb-logout-popup');
            if (e.target === popup) {
                closeLogoutPopup();
            }
        });

        const profileMoreOptionsBtn = document.querySelector('.more-options-btn');
        if (profileMoreOptionsBtn) {
            const menu = profileMoreOptionsBtn.nextElementSibling;
            profileMoreOptionsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            });
        }
    </script>
